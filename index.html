<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>羽田クロノゲート専用バース着け番号検索</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
  background: #f7f7f7;
  margin: 0;
}

h2 {
  font-size: 22px;
  margin-bottom: 8px;
}

.sub {
  font-size: 13px;
  color: gray;
  margin-bottom: 15px;
  line-height: 1.6;
}

input, button {
  font-size: 18px;
  padding: 12px;
  margin: 5px 0;
  width: 100%;
  border-radius: 10px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

button {
  background: #222;
  color: white;
  border: none;
}

.box {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-top: 15px;
}

.suggestions {
  background: white;
  border: 1px solid #ccc;
  border-radius: 10px;
  max-height: 200px;
  overflow-y: auto;
}

.suggestion-item {
  padding: 10px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

.suggestion-item:hover {
  background: #f0f0f0;
}

.table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 15px;
  table-layout: fixed;
}

th, td {
  border: 1px solid #ccc;
  padding: 10px 8px;
  text-align: left;
  vertical-align: top;
  word-break: break-word;
}

th {
  background: #eee;
}

th:nth-child(1), td:nth-child(1) {
  width: 28%;
}

th:nth-child(2), td:nth-child(2) {
  width: 22%;
}

th:nth-child(3), td:nth-child(3) {
  width: 50%;
  font-size: 13px;
  color: #555;
  line-height: 1.5;
}

.footer {
  text-align: center;
  font-size: 12px;
  color: #888;
  margin-top: 25px;
}
</style>
</head>

<body>

<h2>🚚 羽田クロノゲート専用バース着け番号検索</h2>
<div class="sub">
（11時から開始の着車用に作成しています。時間帯などにより着けるバースが異なる場合がありますのでご注意ください。）
</div>

<input id="destination" placeholder="行き先入力（例：中根、なかね）" oninput="showSuggestions()">
<div id="suggestions" class="suggestions"></div>

<button onclick="search()">検索</button>

<div id="output" class="box">ここに結果表示</div>

<div class="box">
  <h3>📋 一覧表示</h3>
  <button onclick="toggleTable()">一覧を表示 / 非表示</button>
  <div id="tableArea" style="display:none; margin-top:10px;"></div>
</div>

<div class="footer">
作成者：坂本 ｜ Ver 4.1
</div>

<script>
const data = {
  "神宮前２丁目": { berth:"17番バース", info:"", kana:"じんぐうまえにちょうめ" },
  "馬事公苑": { berth:"32番バース", info:"", kana:"ばじこうえん" },
  "中根": { berth:"74番バース", info:"南側で卸す場合はその場で積める場合があるのでヤマトのスタッフに確認してください", kana:"なかね" },
  "八幡山": { berth:"33番バース", info:"", kana:"はちまんやま" },
  "目黒ＥＣ": { berth:"14番バース", info:"", kana:"めぐろえし" },
  "中目黒": { berth:"77番バース", info:"", kana:"なかめぐろ" },
  "太子堂": { berth:"36番バース", info:"", kana:"たいしどう" },
  "仲池上": { berth:"98番バース", info:"", kana:"なかいけがみ" },
  "渋谷恵比寿": { berth:"11番バース", info:"", kana:"しぶやえびす" }
};

function toHiragana(str){
  return str.replace(/[\u30a1-\u30f6]/g, m => String.fromCharCode(m.charCodeAt(0) - 0x60));
}

function showSuggestions(){
  let input = destination.value.trim();
  suggestions.innerHTML = "";
  if(!input) return;

  let hira = toHiragana(input);

  Object.keys(data).forEach(k => {
    if(k.includes(input) || data[k].kana.includes(hira)){
      let d = document.createElement("div");
      d.className = "suggestion-item";
      d.innerText = k;
      d.onclick = () => {
        destination.value = k;
        suggestions.innerHTML = "";
        search();
      };
      suggestions.appendChild(d);
    }
  });
}

function search(){
  let input = destination.value.trim();
  let hira = toHiragana(input);

  let found = Object.keys(data).find(k => k === input || data[k].kana.includes(hira));

  if(found){
    output.innerHTML =
      `行き先：${found}<br>
       バース：${data[found].berth}<br>
       ${data[found].info ? "<strong>補足：</strong>" + data[found].info : ""}`;
  } else {
    output.innerHTML = "該当なし";
  }
}

function toggleTable(){
  let area = document.getElementById("tableArea");

  if(area.style.display === "none"){
    area.style.display = "block";
    renderTable();
  } else {
    area.style.display = "none";
  }
}

function getBerthNumber(str){
  return parseInt(str.replace(/[^\d]/g, "")) || 0;
}

function renderTable(){
  let sorted = Object.keys(data).sort((a, b) => {
    return getBerthNumber(data[a].berth) - getBerthNumber(data[b].berth);
  });

  let html = '<div class="table-wrap"><table>';
  html += "<tr><th>行き先</th><th>バース</th><th>補足</th></tr>";

  sorted.forEach(key => {
    let item = data[key];
    html += `
      <tr>
        <td>${key}</td>
        <td>${item.berth}</td>
        <td>${item.info ? item.info : "-"}</td>
      </tr>
    `;
  });

  html += "</table></div>";

  document.getElementById("tableArea").innerHTML = html;
}
</script>

</body>
</html>
