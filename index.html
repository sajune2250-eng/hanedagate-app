<script>
const data = {
  "神宮前２丁目": { berth: "17番バース", info: "", kana: "じんぐうまえにちょうめ" },
  "馬事公苑": { berth: "32番バース", info: "", kana: "ばじこうえん" },
  "中根": { berth: "74番バース", info: "南側で卸す場合はその場で積める場合があるのでヤマトのスタッフに確認してください", kana: "なかね" },
  "八幡山": { berth: "33番バース", info: "", kana: "はちまんやま" },
  "目黒ＥＣ": { berth: "14番バース", info: "", kana: "めぐろいーしー" },
  "中目黒": { berth: "77番バース", info: "", kana: "なかめぐろ" },
  "太子堂": { berth: "36番バース", info: "", kana: "たいしどう" },
  "仲池上": { berth: "98番バース", info: "", kana: "なかいけがみ" },
  "渋谷恵比寿": { berth: "11番バース", info: "", kana: "しぶやえびす" }
};

function toHiragana(str) {
  return str.replace(/[\u30a1-\u30f6]/g, m => String.fromCharCode(m.charCodeAt(0) - 0x60));
}

function showSuggestions() {
  let input = document.getElementById("destination").value.trim();
  let suggestionsDiv = document.getElementById("suggestions");
  suggestionsDiv.innerHTML = "";
  if (!input) return;

  let hira = toHiragana(input);

  let matches = Object.keys(data).filter(key =>
    key.includes(input) || data[key].kana.includes(hira)
  );

  matches.forEach(match => {
    let div = document.createElement("div");
    div.className = "suggestion-item";
    div.innerText = match;
    div.onclick = () => {
      document.getElementById("destination").value = match;
      suggestionsDiv.innerHTML = "";
      search();
    };
    suggestionsDiv.appendChild(div);
  });
}

function search() {
  let input = document.getElementById("destination").value.trim();
  let result = document.getElementById("output");
  let hira = toHiragana(input);

  let found = Object.keys(data).find(key =>
    key === input || data[key].kana.includes(hira)
  );

  if (found) {
    result.innerHTML = `
      <strong>行き先：</strong> ${found}<br>
      <strong>バース：</strong> ${data[found].berth}<br>
      ${data[found].info ? "<strong>補足：</strong>" + data[found].info : ""}
    `;
  } else {
    result.innerHTML = "該当データなし";
  }
}
</script>
