<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>羽田クロノゲート専用バース着け番号検索</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      margin: 0;
      background: #f7f7f7;
    }

    h2 {
      margin-bottom: 10px;
      font-size: 22px;
    }

    .sub {
      font-size: 14px;
      color: gray;
      margin-bottom: 15px;
    }

    input, button {
      font-size: 18px;
      padding: 12px;
      margin: 5px 0;
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      background: #222;
      color: white;
      border: none;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
      line-height: 1.7;
    }

    .box {
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 10px;
      background: white;
    }

    .suggestions {
      border: 1px solid #ccc;
      border-radius: 10px;
      max-height: 220px;
      overflow-y: auto;
      margin-top: 5px;
      background: white;
    }

    .suggestion-item {
      padding: 12px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
    }

    .suggestion-item:last-child {
      border-bottom: none;
    }

    .suggestion-item:hover {
      background-color: #f0f0f0;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>

  <h2>🚚 羽田クロノゲート専用バース着け番号検索</h2>
  <div class="sub">（11時からの着車用に作成しています。時間帯などにより着けるバースが異なる場合があるのでご注意ください。）</div>

  <input
    type="text"
    id="destination"
    placeholder="行き先を入力（例：中根、なかね）"
    oninput="showSuggestions()"
  >

  <div id="suggestions" class="suggestions"></div>

  <button onclick="search()">検索</button>

  <div class="result box" id="output">ここに結果が表示されます</div>

  <script>
    const data = {
      "神宮前２丁目": { berth: "17番バース", info: "", kana: "じんぐうまえにちょうめ" },
      "馬事公苑": { berth: "32番バース", info: "", kana: "ばじこうえん" },
      "中根": { berth: "74番バース", info: "南側で卸す場合はその場で積める場合があるのでヤマトのスタッフに確認してください", kana: "なかね" },
      "八幡山": { berth: "33番バース", info: "", kana: "はちまんやま" },
      "目黒ＥＣ": { berth: "14番バース", info: "", kana: "めぐろえし" },
      "中目黒": { berth: "77番バース", info: "", kana: "なかめぐろ" },
      "太子堂": { berth: "36番バース", info: "", kana: "たいしどう" },
      "仲池上": { berth: "98番バース", info: "", kana: "なかいけがみ" },
      "渋谷恵比寿": { berth: "11番バース", info: "", kana: "しぶやえびす" }
    };

    function toHiragana(str) {
      return str
        .toLowerCase()
        .replace(/[\u30a1-\u30f6]/g, m =>
          String.fromCharCode(m.charCodeAt(0) - 0x60)
        );
    }

    function showSuggestions() {
      const input = document.getElementById("destination").value.trim();
      const suggestionsDiv = document.getElementById("suggestions");
      suggestionsDiv.innerHTML = "";

      if (!input) return;

      const hiraInput = toHiragana(input);

      const matches = Object.keys(data).filter(key =>
        key.includes(input) || data[key].kana.includes(hiraInput)
      );

      matches.forEach(match => {
        const div = document.createElement("div");
        div.className = "suggestion-item";
        div.innerText = match;

        div.onclick = () => {
          document.getElementById("destination").value = match;
          suggestionsDiv.innerHTML = "";
          search();
        };

        suggestionsDiv.appendChild(div);
      });
    }

    function search() {
      const input = document.getElementById("destination").value.trim();
      const result = document.getElementById("output");
      const hiraInput = toHiragana(input);

      const found = Object.keys(data).find(key =>
        key === input || data[key].kana.includes(hiraInput)
      );

      if (found) {
        result.innerHTML =
          "<strong>行き先：</strong>" + found + "<br>" +
          "<strong>バース：</strong>" + data[found].berth + "<br>" +
          (data[found].info ? "<strong>補足：</strong>" + data[found].info : "");
      } else {
        result.innerHTML = "該当データなし";
      }
    }
  </script>

  <div class="footer">
    作成者：アートバンライン京浜支店：坂本 ｜ Ver 1.0
  </div>

</body>
</html>
