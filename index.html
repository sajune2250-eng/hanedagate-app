<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>羽田クロノゲート専用バース着け番号検索</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
  background: #f7f7f7;
}

h2 {
  font-size: 22px;
  margin-bottom: 5px;
}

.sub {
  font-size: 13px;
  color: gray;
  margin-bottom: 15px;
}

input, button {
  font-size: 18px;
  padding: 12px;
  margin: 5px 0;
  width: 100%;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  background: #222;
  color: white;
  border: none;
}

.box {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-top: 15px;
  font-size: 18px;
}

.suggestions {
  background: white;
  border: 1px solid #ccc;
  border-radius: 10px;
  max-height: 200px;
  overflow-y: auto;
}

.suggestion-item {
  padding: 10px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

.suggestion-item:hover {
  background: #f0f0f0;
}

.quick button {
  width: auto;
  margin: 3px;
  padding: 8px 12px;
  font-size: 14px;
}

.footer {
  text-align: center;
  font-size: 12px;
  color: #888;
  margin-top: 25px;
}
</style>
</head>

<body>

<h2>🚚 羽田クロノゲート専用バース着け番号検索</h2>
<div class="sub">
（11時から開始の着車用に作成しています。時間帯などにより着けるバースが異なる場合がありますのでご注意ください。）
</div>

<input id="destination" placeholder="行き先入力（例：中根、なかね）" oninput="showSuggestions()">
<div id="suggestions" class="suggestions"></div>

<button onclick="search()">検索</button>

<div id="output" class="box">ここに結果が表示されます。</div>

<div class="footer">
作成者：アートバンライン京浜支店：坂本 ｜ Ver 1.0
</div>

<script>
const data = {
  "神宮前２丁目": { berth:"17番バース", info:"", kana:"じんぐうまえにちょうめ" },
  "馬事公苑": { berth:"32番バース", info:"", kana:"ばじこうえん" },
  "中根": { berth:"74番バース", info:"南側で卸す場合はその場で積める場合があるのでヤマトのスタッフに確認してください", kana:"なかね" },
  "八幡山": { berth:"33番バース", info:"", kana:"はちまんやま" },
  "目黒ＥＣ": { berth:"14番バース", info:"", kana:"めぐろえし" },
  "中目黒": { berth:"77番バース", info:"", kana:"なかめぐろ" },
  "太子堂": { berth:"36番バース", info:"", kana:"たいしどう" },
  "仲池上": { berth:"98番バース", info:"", kana:"なかいけがみ" },
  "渋谷恵比寿": { berth:"11番バース", info:"", kana:"しぶやえびす" }
};

function toHiragana(str){
  return str.replace(/[\u30a1-\u30f6]/g, m=>String.fromCharCode(m.charCodeAt(0)-0x60));
}

function showSuggestions(){
  let input = destination.value.trim();
  suggestions.innerHTML="";
  if(!input) return;

  let hira = toHiragana(input);

  Object.keys(data).forEach(k=>{
    if(k.includes(input)||data[k].kana.includes(hira)){
      let d=document.createElement("div");
      d.className="suggestion-item";
      d.innerText=k;
      d.onclick=()=>{ destination.value=k; search(); };
      suggestions.appendChild(d);
    }
  });
}

function search(){
  let input = destination.value.trim();
  let hira = toHiragana(input);

  let found = Object.keys(data).find(k=>k===input||data[k].kana.includes(hira));

  if(found){
    output.innerHTML=
`行き先：${found}<br>
バース：${data[found].berth}<br>
${data[found].info ? "補足：" + data[found].info : ""}`;
  }else{
    output.innerHTML="該当なし";
  }
}

</script>

</body>
</html>
