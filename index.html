<script>
const data = {
  "神宮前２丁目": {
    berth: "17番バース",
    info: "",
    kana: "じんぐうまえにちょうめ"
  },
  "馬事公苑": {
    berth: "32番バース",
    info: "",
    kana: "ばじこうえん"
  },
  "中根": {
    berth: "74番バース",
    info: "南側で卸す場合はその場で積める場合があるのでヤマトのスタッフに確認してください",
    kana: "なかね"
  },
  "八幡山": {
    berth: "33番バース",
    info: "",
    kana: "はちまんやま"
  }
};

// 🔤 ひらがな変換（カタカナ→ひらがな）
function toHiragana(str) {
  return str.replace(/[\u30a1-\u30f6]/g, function(match) {
    return String.fromCharCode(match.charCodeAt(0) - 0x60);
  });
}

// 🔍 候補表示
function showSuggestions() {
  let input = document.getElementById("destination").value.trim();
  let suggestionsDiv = document.getElementById("suggestions");

  suggestionsDiv.innerHTML = "";

  if (input === "") return;

  let hiraInput = toHiragana(input);

  let matches = Object.keys(data).filter(key => {
    return key.includes(input) || data[key].kana.includes(hiraInput);
  });

  matches.forEach(match => {
    let div = document.createElement("div");
    div.className = "suggestion-item";
    div.innerText = match;

    div.onclick = () => {
      document.getElementById("destination").value = match;
      suggestionsDiv.innerHTML = "";
      search();
    };

    suggestionsDiv.appendChild(div);
  });
}

// 🔎 検索
function search() {
  let input = document.getElementById("destination").value.trim();
  let result = document.getElementById("output");

  let hiraInput = toHiragana(input);

  let found = Object.keys(data).find(key => {
    return key === input || data[key].kana.includes(hiraInput);
  });

  if (found) {
    let berth = data[found].berth;
    let info = data[found].info;

    result.innerHTML = `
      <strong>行き先：</strong> ${found}<br>
      <strong>バース：</strong> ${berth}<br>
      ${info ? "<strong>補足：</strong> " + info : ""}
    `;
  } else {
    result.innerHTML = "該当データなし";
  }
}
</script>
